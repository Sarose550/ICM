name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libfftw3-dev

      - name: Build bench_grid
        run: make

      - name: Run verification tests
        run: ./bench_grid verify

      - name: Build libicm.a
        run: make libicm.a
